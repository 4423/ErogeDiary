name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ErogeDiary/ErogeDiary.csproj

      - name: Publish
        run: >
          dotnet publish ErogeDiary/ErogeDiary.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishReadyToRun=true
          -o publish/win-x64

      - name: Create ZIP
        shell: pwsh
        run: |
          $zipName = "ErogeDiary_${{ github.ref_name }}.zip"
          Compress-Archive -Path publish/win-x64/* -DestinationPath "publish/$zipName" -Force

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: publish/ErogeDiary_${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
